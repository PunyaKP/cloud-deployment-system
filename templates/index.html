<!DOCTYPE html>
<html>
<head>
    <title>Cloud Deployment</title>
    <style>
        :root {
    --bg: #020617;            /* deep black-blue */
    --card: #0f172a;          /* dark blue */
    --card-light: #1e293b;    /* slightly lighter */
    
    --primary: #38bdf8;       /* light blue */
    --secondary: #0ea5e9;     /* blue */
    
    --text: #f1f5f9;          /* white */
    --muted: #94a3b8;         /* soft gray */
}
    body {
    margin: 0;
    font-family: 'Poppins', sans-serif;

    background:
        radial-gradient(circle at 20% 20%, rgba(56,189,248,0.15), transparent),
        radial-gradient(circle at 80% 80%, rgba(14,165,233,0.12), transparent),
        var(--bg);

    color: var(--text);

    min-height: 100vh;
    overflow-x: hidden;
}
/* container */
.container {
    width: 90%;
    margin: auto;
    padding: 40px;
}

/* title */
h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 1px;
}

/* stats cards */
.stats {
    display: flex;
    gap: 20px;
    margin-bottom: 40px;
}

.card {
    flex: 1;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(14px);

    padding: 20px;
    border-radius: 14px;

    border: 1px solid rgba(255,255,255,0.08);

    box-shadow: 
        0 10px 30px rgba(0,0,0,0.6),
        0 0 20px rgba(56,189,248,0.05);

    transition: 0.3s;
}
.card:hover {
    transform: translateY(-6px) scale(1.02);

    box-shadow:
        0 20px 40px rgba(0,0,0,0.8),
        0 0 25px rgba(56,189,248,0.15);
}


/* form */
form {
    text-align: center;
    margin-bottom: 30px;
}

button {
    background: linear-gradient(135deg, var(--primary),var(--secondary));
    border: none;
    padding: 12px 25px;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(56,189,248,0.3);
}

/* pipeline */
.pipeline {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin: 50px 0;
}

.step {
    padding: 10px 18px;
    border-radius: 10px;

    background: rgba(255,255,255,0.05);
    color: #aaa;

    transition: all 0.3s;
}

.step.active {
    background: linear-gradient(135deg, #00ffcc, #00c6ff);
    color: black;

    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    transform: scale(1.1);
}

.arrow {
    color: #38bdf8;
}

/* grid */
.grid {
    display: flex;
    gap: 20px;
}

/* boxes */
.box {
    flex: 1;
    background: #0f172a;
    padding: 20px;
    border-radius: 12px;
}

.top-line {
    width: 120px;
    height: 4px;
    margin: 10px auto 30px;
    background: linear-gradient(90deg, transparent, #00ffc6, transparent);
    border-radius: 10px;
}

.dashboard, .card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

.active {
    background: linear-gradient(45deg, #00ffcc, #00ff88);
    color: black;
    box-shadow: 0 0 15px #00ffcc, 0 0 30px #00ff88;
    transform: scale(1.08);
    transition: 0.3s;
}

/* progress */
.progress-container {
    height: 20px;
    background: #1e293b;
    border-radius: 10px;
}

#progressBar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--primary), var(--secondary));

    transition: width 0.5s ease-in-out;

    box-shadow:
        0 0 10px rgba(56,189,248,0.6),
        0 0 20px rgba(56,189,248,0.4);
}

#statusText {
    font-weight: bold;
    color: var(--primary);
    text-shadow: 0 0 6px rgba(56,189,248,0.6);
}

#statusText.active {
    text-shadow: 0 0 12px rgba(0,255,200,0.8);
}


/* logs */
#logBox {
    height: 150px;
    overflow-y: auto;
    font-family: monospace;
    color: #22c55e;
}

/* ANIMATION */
.fade-in {
    animation: fadeIn 0.9s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px);}
    to { opacity: 1; transform: translateY(0);}
}
h1 {
    letter-spacing: 1px;
}

.card h3 {
    color: #94a3b8;
    font-size: 14px;
}

.card p {
    font-size: 18px;
    margin-top: 5px;
}
/* ===== GRAPH ===== */

.graph-container {
    margin-top: 20px;
    padding: 20px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.05);
}

.graph {
    width: 100%;
    height: 140px;
}

/* glowing line */
.graph path {
    filter: drop-shadow(0 0 8px rgba(56,189,248,0.7));
}

/* moving dot */
.dot {
    fill: var(--primary);
    filter: drop-shadow(0 0 10px rgba(56,189,248,1));
}
</style>
</head>
<body>
<div class="container">

    <!-- HEADER -->
    <h1>🚀 Cloud Deployment </h1>
    <div class="top-line"></div>
    <!-- STATS -->
    <div class="stats">
        <div class="card">
            <h3>Status</h3>
            <p id="statusText">Idle</p>
        </div>
        <div class="card">
            <h3>Progress</h3>
            <p id="progressText">0%</p>
        </div>
        <div class="card">
            <h3>Environment</h3>
            <p>Production</p>
        </div>
    </div>
    <div class="metrics">
    <p>⚡ CPU Usage: <span id="cpu">23%</span></p>
    <p>💾 Memory: <span id="memory">1.2GB</span></p>
</div>

    <!-- FORM -->
    <form id="uploadForm" action="/deploy" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br><br>
        <button type="submit">Deploy</button>
    </form>

    <!-- PIPELINE -->
    <div class="pipeline">
        <div class="step" id="step1">👨‍💻 Dev</div>
        <div class="arrow">→</div>
        <div class="step" id="step2">📦 Git</div>
        <div class="arrow">→</div>
        <div class="step" id="step3">⚙️ CI/CD</div>
        <div class="arrow">→</div>
        <div class="step" id="step4">🐳 Docker</div>
        <div class="arrow">→</div>
        <div class="step" id="step5">☁️ AWS</div>
        <div class="arrow">→</div>
        <div class="step" id="step6">🌐 Live</div>
    </div>

    <!-- LOWER GRID -->
    <div class="grid">

        <!-- PROGRESS -->
        <div class="box">
            <h3>Deployment Progress</h3>
            <div class="graph-container">
    <h3>📊 Live System Activity</h3>

    <svg viewBox="0 0 300 120" width="100%" height="150">
        <defs>
            <linearGradient id="cpuGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#38bdf8"/>
                <stop offset="100%" stop-color="#22c55e"/>
            </linearGradient>
        </defs>

        <!-- CPU line -->
        <path id="cpuPath" fill="none" stroke="url(#cpuGradient)" stroke-width="3"/>

        <!-- Memory line -->
        <path id="memPath" fill="none" stroke="#f97316" stroke-width="2"/>

        <!-- moving dot -->
        <circle id="dot" r="4" fill="#38bdf8"/>
    </svg>
</div>
</div>
            <div class="progress-container">
                <div id="progressBar"></div>
            </div>
        </div>

        <!-- LOGS -->
        <div class="box">
            <h3>Live Logs</h3>
            <div id="logBox"></div>
        </div>

    </div>

</div>

<script>

let steps = ["step1","step2","step3","step4","step5","step6"];
let i = 0;
let progress = 0;

function runPipeline() {

    function nextStep() {

        if (i < steps.length) {

            let el = document.getElementById(steps[i]);

            if (!el) {
                console.log("Missing ID:", steps[i]);
                return;
            }

            el.classList.add("active");

            // ✅ FIXED PROGRESS
            progress = Math.min(progress + (100 / steps.length), 100);

            // ✅ UPDATE UI
            document.getElementById("progressText").innerText = Math.round(progress) + "%";
            document.getElementById("progressBar").style.width = progress + "%";

            document.getElementById("statusText").innerText = "Deploying...";

            addLog("✓ " + el.innerText + " completed");

            i++;

            setTimeout(nextStep, 900);
        } 
        else {
            document.getElementById("statusText").innerText = "🚀 Production Live";
            addLog("🚀 Deployment Finished!");
        }
    }
    i = 0;
    progress = 0;
    nextStep();
}

function addLog(text) {
    let logBox = document.getElementById("logBox");

    let p = document.createElement("p");
    p.innerText = text;
    p.classList.add("fade-in");

    logBox.appendChild(p);
}

document.getElementById("uploadForm").addEventListener("submit", function(e) {

    e.preventDefault(); // stop immediate submit

    // run animation
    runPipeline();

    // AFTER animation, submit form
    setTimeout(() => {
        this.submit();   // ✅ FIX (use this, not event.target.submit)
    }, 6000);

    setInterval(() => {
    document.getElementById("cpu").innerText = Math.floor(Math.random()*50+10) + "%";
    document.getElementById("memory").innerText = (Math.random()*2+1).toFixed(1) + "GB";
}, 2000);

});

</script>
<script>
const cpuPath = document.getElementById("cpuPath");
const memPath = document.getElementById("memPath");
const dot = document.getElementById("dot");

let cpuData = [];
let memData = [];

function updateGraph() {
    fetch("/metrics")
        .then(res => res.json())
        .then(data => {
            cpuData.push(data.cpu);
            memData.push(data.memory * 20);

            if (cpuData.length > 30) {
                cpuData.shift();
                memData.shift();
            }

            drawGraph();
        });
}

function drawGraph() {
    let cpuPoints = cpuData.map((v, i) => `${i * 10},${120 - v}`);
    let memPoints = memData.map((v, i) => `${i * 10},${120 - v}`);

    cpuPath.setAttribute("d", "M " + cpuPoints.join(" L "));
    memPath.setAttribute("d", "M " + memPoints.join(" L "));

    if (cpuPoints.length > 0) {
    let last = cpuPoints[cpuPoints.length - 1].split(",");

    dot.setAttribute("cx", last[0]);
    dot.setAttribute("cy", last[1]);
}
}

setInterval(updateGraph, 1000);
updateGraph();
</script>
</script>
</body>
</html>
