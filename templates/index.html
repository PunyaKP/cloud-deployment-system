<!DOCTYPE html>
<html>
<head>
    <title>Cloud Deployment</title>
    <style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
}

/* TITLE */
h1 {
    margin-top: 30px;
    font-size: 32px;
    background: linear-gradient(to right, #38bdf8, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* DASHBOARD */
.dashboard {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 30px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    width: 200px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* FORM */
form {
    margin-top: 20px;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg, #6366f1, #38bdf8);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* PIPELINE */
.pipeline {
    display: flex;
    justify-content: center;
    margin-top: 40px;
    flex-wrap: wrap;
}

.step {
    padding: 12px 18px;
    border-radius: 10px;
    margin: 5px;
    background: rgba(255,255,255,0.08);
    transition: 0.4s;
}

/* GLOW EFFECT */
.step.active {
    background: linear-gradient(45deg, #22c55e, #06b6d4);
    color: white;
    box-shadow: 0 0 15px #22c55e;
    transform: scale(1.1);
}

/* ARROW */
.arrow {
    font-size: 20px;
    margin: 5px;
}

/* LOG BOX */
#logBox {
    margin: 30px auto;
    width: 60%;
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 10px;
    text-align: left;
    backdrop-filter: blur(10px);
}

/* ANIMATION */
.fade-in {
    animation: fadeIn 0.5s ease-in;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px);}
    to { opacity: 1; transform: translateY(0);}
}
</style>
</head>
<body>
<div style="text-align:center; margin-top:50px;">

    <h1> Automated Cloud Deployment</h1>
    

    {% if message %}
        <p>{{ message }}</p>
    {% endif %}

    <form id="uploadForm" action="/deploy" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br><br>
        <button type="submit">Deploy</button>
    </form>

    <!-- Progress Bar -->
    <div id="progressContainer" style="display:none; margin-top:20px;">
        <p>Deploying...</p>
        <div style="width:300px; margin:auto; background:#eee; border-radius:10px;">
            <div id="progressBar" 
                 style="width:0%; height:20px; background:#4CAF50; border-radius:10px;">
            </div>
        </div>
    </div>

</div>
</div>   <!-- progress bar end -->

<!-- ✅ ADD HERE -->
<div id="pipelineFlow" style="margin-top:30px;">
    <div class="pipeline">
        <div class="step" id="step1">👨‍💻 Developer</div>
        <div class="arrow">➡️</div>
        <div class="step" id="step2">📂 GitHub</div>
        <div class="arrow">➡️</div>
        <div class="step" id="step3">⚙️ Jenkins</div>
        <div class="arrow">➡️</div>
        <div class="step" id="step4">🐳 Docker</div>
        <div class="arrow">➡️</div>
        <div class="step" id="step5">☁️ AWS</div>
        <div class="arrow">➡️</div>
        <div class="step" id="step6">🌐 Live</div>
    </div>
</div>

<script>

let steps = ["step1","step2","step3","step4","step5","step6"];
let i = 0;
let progress = 0;

function runPipeline() {

    if (i < steps.length) {

        let el = document.getElementById(steps[i]);

        if (!el) {
            console.log("Missing ID:", steps[i]);
            return;
        }

        el.classList.add("active");

        progress += 16;

        let progressText = document.getElementById("progressText");
        if (progressText) progressText.innerText = progress + "%";

        let statusText = document.getElementById("statusText");
        if (statusText) statusText.innerText = "Deploying...";

        if (typeof addLog === "function") {
            addLog("✓ " + el.innerText + " completed");
        }

        i++;

        setTimeout(runPipeline, 1000); // 🔥 smooth animation
    } 
    else {
        let statusText = document.getElementById("statusText");
        if (statusText) statusText.innerText = "🚀 Live";

        if (typeof addLog === "function") {
            addLog("🚀 Deployment Finished!");
        }
    }
}

    nextStep();
}

function addLog(text) {
    let logBox = document.getElementById("logBox");

    let p = document.createElement("p");
    p.innerText = text;
    p.classList.add("fade-in");

    logBox.appendChild(p);
}

document.getElementById("uploadForm").addEventListener("submit", function(e) {

    e.preventDefault(); // stop immediate submit

    // run animation
    runPipeline();

    // AFTER animation, submit form
    setTimeout(() => {
        this.submit();   // ✅ FIX (use this, not event.target.submit)
    }, 6000);

});

</script>

</body>
</html>
