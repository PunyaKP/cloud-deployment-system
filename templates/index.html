<!DOCTYPE html>
<html>
<head>
    <title>Cloud Deployment</title>
    <style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;

    background:
        radial-gradient(circle at 20% 20%, #00ffcc22, transparent),
        radial-gradient(circle at 80% 80%, #0072ff22, transparent),
        #020617;

    color: #e2e8f0;
}

/* container */
.container {
    width: 90%;
    margin: auto;
    padding: 30px;
}

/* title */
h1 {
    text-align: center;
    margin-bottom: 30px;
}

/* stats cards */
.stats {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    flex: 1;
    padding: 20px;
    border-radius: 16px;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);

    border: 1px solid rgba(255,255,255,0.1);

    box-shadow:
        0 8px 32px rgba(0,0,0,0.5),
        inset 0 0 10px rgba(255,255,255,0.05);

    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    .card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 3px;

    background: linear-gradient(90deg, transparent, #00ffcc, transparent);
    transition: 0.5s;
}

.card:hover::before {
    left: 100%;
}
}
.card:hover {
    transform: translateY(-6px) scale(1.02);

    box-shadow:
        0 15px 40px rgba(0,0,0,0.7),
        0 0 20px rgba(0,255,204,0.4);
}



/* form */
form {
    text-align: center;
    margin-bottom: 30px;
}

button {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    border: none;
    padding: 12px 25px;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00c6ff;
}

/* pipeline */
.pipeline {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin: 40px 0;
}

.step {
    padding: 10px 18px;
    border-radius: 10px;

    background: rgba(255,255,255,0.05);
    color: #aaa;

    transition: all 0.3s;
}

.step.active {
    background: linear-gradient(135deg, #00ffcc, #00c6ff);
    color: black;

    box-shadow:
        0 0 15px #00ffcc,
        0 0 30px #00c6ff;

    transform: scale(1.1);
}

.arrow {
    color: #38bdf8;
}

/* grid */
.grid {
    display: flex;
    gap: 20px;
}

/* boxes */
.box {
    flex: 1;
    background: #0f172a;
    padding: 20px;
    border-radius: 12px;
}

.top-line {
    width: 120px;
    height: 4px;
    margin: 10px auto 30px;
    background: linear-gradient(90deg, #00ffcc, #00c6ff);
    border-radius: 10px;
    box-shadow: 0 0 15px #00ffcc;
}

.dashboard, .card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

.active {
    background: linear-gradient(45deg, #00ffcc, #00ff88);
    color: black;
    box-shadow: 0 0 15px #00ffcc, 0 0 30px #00ff88;
    transform: scale(1.08);
    transition: 0.3s;
}

/* progress */
.progress-container {
    height: 20px;
    background: #1e293b;
    border-radius: 10px;
}

#progressBar {
    height: 100%;
    width: 0%;

    background: linear-gradient(90deg, #00ffcc, #00c6ff);

    transition: width 0.4s ease-in-out;

    box-shadow:
        0 0 10px #00ffcc,
        0 0 30px #00c6ff;
}

#statusText {
    font-weight: bold;
    color: #00ffcc;

    text-shadow:
        0 0 10px #00ffcc,
        0 0 20px #00ffcc,
        0 0 40px #00ffcc;
}

/* logs */
#logBox {
    height: 150px;
    overflow-y: auto;
    font-family: monospace;
    color: #22c55e;
}

/* ANIMATION */
.fade-in {
    animation: fadeIn 0.5s ease-in;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px);}
    to { opacity: 1; transform: translateY(0);}
}
h1 {
    letter-spacing: 1px;
}

.card h3 {
    color: #94a3b8;
    font-size: 14px;
}

.card p {
    font-size: 18px;
    margin-top: 5px;
}
</style>
</head>
<body>
<div class="container">

    <!-- HEADER -->
    <h1>🚀 Cloud Deployment Dashboard</h1>
    <div class="top-line"></div>
    <!-- STATS -->
    <div class="stats">
        <div class="card">
            <h3>Status</h3>
            <p id="statusText">Idle</p>
        </div>
        <div class="card">
            <h3>Progress</h3>
            <p id="progressText">0%</p>
        </div>
        <div class="card">
            <h3>Environment</h3>
            <p>Production</p>
        </div>
    </div>
    <div class="metrics">
    <p>⚡ CPU Usage: <span id="cpu">23%</span></p>
    <p>💾 Memory: <span id="memory">1.2GB</span></p>
</div>

    <!-- FORM -->
    <form id="uploadForm" action="/deploy" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br><br>
        <button type="submit">Deploy</button>
    </form>

    <!-- PIPELINE -->
    <div class="pipeline">
        <div class="step" id="step1">👨‍💻 Dev</div>
        <div class="arrow">→</div>
        <div class="step" id="step2">📦 Git</div>
        <div class="arrow">→</div>
        <div class="step" id="step3">⚙️ CI</div>
        <div class="arrow">→</div>
        <div class="step" id="step4">🐳 Docker</div>
        <div class="arrow">→</div>
        <div class="step" id="step5">☁️ AWS</div>
        <div class="arrow">→</div>
        <div class="step" id="step6">🌐 Live</div>
    </div>

    <!-- LOWER GRID -->
    <div class="grid">

        <!-- PROGRESS -->
        <div class="box">
            <h3>Deployment Progress</h3>
            <div class="progress-container">
                <div id="progressBar"></div>
            </div>
        </div>

        <!-- LOGS -->
        <div class="box">
            <h3>Live Logs</h3>
            <div id="logBox"></div>
        </div>

    </div>

</div>

<script>

let steps = ["step1","step2","step3","step4","step5","step6"];
let i = 0;
let progress = 0;

function runPipeline() {

    function nextStep() {

        if (i < steps.length) {

            let el = document.getElementById(steps[i]);

            if (!el) {
                console.log("Missing ID:", steps[i]);
                return;
            }

            el.classList.add("active");

            // ✅ FIXED PROGRESS
            progress = Math.min(progress + (100 / steps.length), 100);

            // ✅ UPDATE UI
            document.getElementById("progressText").innerText = Math.round(progress) + "%";
            document.getElementById("progressBar").style.width = progress + "%";

            document.getElementById("statusText").innerText = "Deploying...";

            addLog("✓ " + el.innerText + " completed");

            i++;

            setTimeout(nextStep, 900);
        } 
        else {
            document.getElementById("statusText").innerText = "🚀 Production Live";
            addLog("🚀 Deployment Finished!");
        }
    }
    i = 0;
    progress = 0;
    nextStep();
}

function addLog(text) {
    let logBox = document.getElementById("logBox");

    let p = document.createElement("p");
    p.innerText = text;
    p.classList.add("fade-in");

    logBox.appendChild(p);
}

document.getElementById("uploadForm").addEventListener("submit", function(e) {

    e.preventDefault(); // stop immediate submit

    // run animation
    runPipeline();

    // AFTER animation, submit form
    setTimeout(() => {
        this.submit();   // ✅ FIX (use this, not event.target.submit)
    }, 6000);

    setInterval(() => {
    document.getElementById("cpu").innerText = Math.floor(Math.random()*50+10) + "%";
    document.getElementById("memory").innerText = (Math.random()*2+1).toFixed(1) + "GB";
}, 2000);

});

</script>

</body>
</html>
